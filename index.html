<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peeters Family Calendar</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ═══════════════════════════════════════════════
       ROOT VARIABLES
    ═══════════════════════════════════════════════ */
    :root {
      --matt:       #3b82f6;
      --matt-light: #dbeafe;
      --family:     #10b981;
      --family-light: #d1fae5;
      --bday:       #ec4899;
      --bday-light: #fce7f3;
      --forest:     #f97316;
      --forest-light: #ffedd5;
      --bg:         #f1f5f9;
      --card:       #ffffff;
      --header:     #0f172a;
      --text:       #1e293b;
      --text-muted: #64748b;
      --border:     #e2e8f0;
      --today-ring: #f59e0b;
      --radius:     12px;
      --shadow:     0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    }

    /* ═══════════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      width: 100%;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }
    button { font-family: inherit; cursor: pointer; border: none; outline: none; }

    /* ═══════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════ */
    header {
      background: var(--header);
      color: #fff;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-icon {
      font-size: 28px;
      line-height: 1;
    }
    .header-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }
    .header-subtitle {
      font-size: 11px;
      color: #94a3b8;
      font-weight: 400;
      margin-top: 1px;
    }

    /* ═══════════════════════════════════════════════
       WEATHER WIDGET (sidebar card)
    ═══════════════════════════════════════════════ */
    #weather-widget {
      display: flex;
      align-items: center;
      justify-content: space-around;
      gap: 12px;
      padding: 12px 16px 16px;
    }
    .weather-day {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      flex: 1;
    }
    .weather-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
      font-weight: 600;
    }
    .weather-emoji { font-size: 28px; line-height: 1; margin: 4px 0; }
    .weather-temp {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .weather-desc {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      white-space: normal;
      line-height: 1.3;
    }
    .weather-divider {
      width: 1px;
      height: 60px;
      background: var(--border);
      flex-shrink: 0;
    }
    .weather-loading {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 8px 0;
    }

    /* ═══════════════════════════════════════════════
       MAIN LAYOUT
    ═══════════════════════════════════════════════ */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
    }
    .calendar-section { min-width: 0; }

    /* ═══════════════════════════════════════════════
       CALENDAR SECTION
    ═══════════════════════════════════════════════ */
    .calendar-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* NAV BAR */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--card);
      border-radius: var(--radius);
      padding: 12px 18px;
      box-shadow: var(--shadow);
    }
    .cal-nav-left { display: flex; align-items: center; gap: 8px; }
    .cal-month-year {
      font-size: 20px;
      font-weight: 700;
      min-width: 220px;
      letter-spacing: -0.4px;
    }
    .nav-btn {
      background: var(--bg);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 16px;
      color: var(--text);
      transition: background .15s;
    }
    .nav-btn:hover { background: #e2e8f0; }
    .today-btn {
      background: var(--header);
      color: #fff;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      transition: opacity .15s;
    }
    .today-btn:hover { opacity: .85; }

    /* Legend */
    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* Loading bar */
    #loading-bar {
      height: 3px;
      background: linear-gradient(90deg, var(--matt), var(--family));
      border-radius: 2px;
      transform-origin: left;
      transform: scaleX(0);
      transition: transform .4s ease;
    }
    #loading-bar.active { transform: scaleX(1); }

    /* CALENDAR GRID */
    .cal-grid-wrap {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .cal-dow-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
    }
    .cal-dow {
      text-align: center;
      padding: 10px 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--text-muted);
    }
    .cal-dow.weekend { color: #94a3b8; }
    .cal-body {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      border-left: 1px solid var(--border);
    }
    .cal-cell {
      min-height: 110px;
      padding: 6px;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .12s;
      position: relative;
      overflow: hidden;
    }
    .cal-cell:hover { background: #f8fafc; }
    .cal-cell.other-month { background: #fafafa; }
    .cal-cell.other-month .cell-date { color: #cbd5e1; }
    .cal-cell.today {
      background: #fffbeb;
      box-shadow: inset 0 0 0 2px var(--today-ring);
    }
    .cal-cell.today .cell-date {
      background: var(--today-ring);
      color: #fff;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }
    .cell-date {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cell-date.weekend { color: #94a3b8; }

    /* Forest school badge */
    .forest-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: var(--forest-light);
      color: var(--forest);
      border-radius: 6px;
      padding: 2px 5px;
      font-size: 10px;
      font-weight: 600;
      margin-bottom: 3px;
      width: 100%;
    }

    /* Event chips */
    .event-chip {
      display: block;
      border-radius: 5px;
      padding: 2px 6px;
      font-size: 10.5px;
      font-weight: 500;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: pointer;
    }
    .event-chip.matt    { background: var(--matt-light);   color: #1d4ed8; }
    .event-chip.family  { background: var(--family-light); color: #065f46; }
    .event-chip.birthday { background: var(--bday-light);  color: #9d174d; }
    .more-events {
      font-size: 10px;
      color: var(--text-muted);
      padding: 1px 4px;
      font-weight: 500;
    }

    /* ═══════════════════════════════════════════════
       SIDEBAR
    ═══════════════════════════════════════════════ */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .sidebar-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .sidebar-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-card-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
    }
    .sidebar-card-body { padding: 12px 16px 16px; }

    /* Add Birthday button */
    .add-btn {
      background: var(--bday);
      color: #fff;
      border-radius: 7px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      transition: opacity .15s;
    }
    .add-btn:hover { opacity: .85; }

    /* Birthday list */
    #birthday-list { display: flex; flex-direction: column; gap: 6px; }
    .bday-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: var(--bday-light);
      border-radius: 8px;
    }
    .bday-item-left { display: flex; align-items: center; gap: 8px; }
    .bday-name { font-size: 13px; font-weight: 600; color: #9d174d; }
    .bday-date { font-size: 11px; color: #be185d; }
    .bday-delete {
      background: none;
      color: #be185d;
      font-size: 16px;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: .6;
      transition: opacity .15s;
    }
    .bday-delete:hover { opacity: 1; }
    .bday-empty {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 8px 0;
    }

    /* Upcoming events sidebar */
    #upcoming-list { display: flex; flex-direction: column; gap: 8px; }
    .upcoming-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .upcoming-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }
    .upcoming-dot.matt   { background: var(--matt); }
    .upcoming-dot.family { background: var(--family); }
    .upcoming-dot.birthday { background: var(--bday); }
    .upcoming-subject {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }
    .upcoming-when {
      font-size: 11px;
      color: var(--text-muted);
    }
    .upcoming-empty {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      padding: 8px 0;
    }

    /* ═══════════════════════════════════════════════
       MODALS
    ═══════════════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--card);
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      width: 460px;
      max-width: calc(100vw - 32px);
      max-height: 90vh;
      overflow-y: auto;
      transform: translateY(12px) scale(.98);
      transition: transform .2s;
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--card);
      z-index: 1;
    }
    .modal-title { font-size: 16px; font-weight: 700; }
    .modal-close {
      background: var(--bg);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 18px;
      color: var(--text-muted);
      transition: background .12s;
    }
    .modal-close:hover { background: var(--border); }
    .modal-body { padding: 16px 20px 20px; }

    /* Day event modal */
    .day-event-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 8px;
    }
    .day-event-item.matt    { background: var(--matt-light); }
    .day-event-item.family  { background: var(--family-light); }
    .day-event-item.birthday { background: var(--bday-light); }
    .day-event-item.forest  { background: var(--forest-light); }
    .day-event-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
    .day-event-subject {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
    }
    .day-event-subject.matt    { color: #1d4ed8; }
    .day-event-subject.family  { color: #065f46; }
    .day-event-subject.birthday { color: #9d174d; }
    .day-event-subject.forest  { color: #c2410c; }
    .day-event-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .day-event-loc {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .no-events-msg {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      padding: 20px 0;
    }

    /* Birthday form */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      transition: border-color .15s;
      background: var(--bg);
    }
    .form-input:focus { outline: none; border-color: var(--bday); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .submit-btn {
      width: 100%;
      padding: 10px;
      border-radius: 9px;
      background: var(--bday);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      transition: opacity .15s;
      margin-top: 4px;
    }
    .submit-btn:hover { opacity: .88; }

    /* ═══════════════════════════════════════════════
       MISC
    ═══════════════════════════════════════════════ */
    .delete-event-btn {
      background: none;
      border: none;
      font-size: 15px;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity .15s;
      flex-shrink: 0;
      padding: 2px 4px;
      border-radius: 4px;
      align-self: flex-start;
    }
    .delete-event-btn:hover { opacity: 1; background: rgba(239,68,68,.1); }

    .spin {
      display: inline-block;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      .sidebar { order: -1; flex-direction: row; flex-wrap: wrap; }
      .sidebar-card { flex: 1; min-width: 240px; }
    }
    @media (max-width: 600px) {
      header { padding: 0 14px; }
      #weather-widget { display: none; }
      main { padding: 12px; gap: 12px; }
      .cal-cell { min-height: 70px; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════
     HEADER
═══════════════════════════════════════════════ -->
<header>
  <div class="header-left">
    <div class="header-icon">🏡</div>
    <div>
      <div class="header-title">Peeters Family Calendar</div>
      <div class="header-subtitle">Matthew &amp; Jamie</div>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════════════
     MAIN
═══════════════════════════════════════════════ -->
<main>
  <!-- LEFT: Calendar -->
  <div class="calendar-section">

    <!-- Nav + legend row -->
    <div class="cal-nav">
      <div class="cal-nav-left">
        <button class="nav-btn" id="btn-prev">&#8592;</button>
        <div class="cal-month-year" id="month-label"></div>
        <button class="nav-btn" id="btn-next">&#8594;</button>
        <button class="today-btn" id="btn-today">Today</button>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--matt)"></div>Matthew</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--family)"></div>Family</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--bday)"></div>Birthdays</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--forest)"></div>Forest School</div>
      </div>
    </div>

    <!-- Loading bar -->
    <div id="loading-bar"></div>

    <!-- Calendar grid -->
    <div class="cal-grid-wrap">
      <div class="cal-dow-header">
        <div class="cal-dow">Mon</div>
        <div class="cal-dow">Tue</div>
        <div class="cal-dow">Wed</div>
        <div class="cal-dow">Thu</div>
        <div class="cal-dow">Fri</div>
        <div class="cal-dow weekend">Sat</div>
        <div class="cal-dow weekend">Sun</div>
      </div>
      <div class="cal-body" id="cal-body"></div>
    </div>

  </div>

  <!-- RIGHT: Sidebar -->
  <div class="sidebar">

    <!-- Weather -->
    <div class="sidebar-card">
      <div class="sidebar-card-header">
        <div class="sidebar-card-title">🌤️ Weather — Newent</div>
      </div>
      <div id="weather-widget">
        <div class="weather-loading">Loading weather…</div>
      </div>
    </div>

    <!-- Add Event -->
    <div class="sidebar-card">
      <div class="sidebar-card-header">
        <div class="sidebar-card-title">📅 Family Calendar</div>
        <button class="add-btn add-event-btn" id="btn-add-event">+ Add Event</button>
      </div>
    </div>

    <!-- Upcoming events -->
    <div class="sidebar-card">
      <div class="sidebar-card-header">
        <div class="sidebar-card-title">Upcoming</div>
      </div>
      <div class="sidebar-card-body">
        <div id="upcoming-list"><div class="upcoming-empty">Loading…</div></div>
      </div>
    </div>

    <!-- Birthdays -->
    <div class="sidebar-card">
      <div class="sidebar-card-header">
        <div class="sidebar-card-title">🎂 Birthdays</div>
        <button class="add-btn" id="btn-add-bday">+ Add</button>
      </div>
      <div class="sidebar-card-body">
        <div id="birthday-list"></div>
      </div>
    </div>

  </div>
</main>

<!-- ═══════════════════════════════════════════════
     MODAL: Day Events
═══════════════════════════════════════════════ -->
<div class="modal-overlay" id="day-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="day-modal-title"></div>
      <button class="modal-close" id="day-modal-close">✕</button>
    </div>
    <div class="modal-body" id="day-modal-body"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     MODAL: Add Event
═══════════════════════════════════════════════ -->
<div class="modal-overlay" id="event-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Family Event</div>
      <button class="modal-close" id="event-modal-close">✕</button>
    </div>
    <div class="modal-body">
      <form id="event-form">
        <div class="form-group">
          <label class="form-label" for="event-title">Title</label>
          <input class="form-input" type="text" id="event-title" placeholder="e.g. School Play" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="event-date">Date</label>
          <input class="form-input" type="date" id="event-date" required />
        </div>
        <div class="form-group">
          <label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer;">
            <input type="checkbox" id="event-allday" style="width:16px;height:16px;cursor:pointer;" />
            <span>All day event</span>
          </label>
        </div>
        <div id="event-time-fields" class="form-row">
          <div class="form-group">
            <label class="form-label" for="event-start">Start Time</label>
            <input class="form-input" type="time" id="event-start" value="09:00" />
          </div>
          <div class="form-group">
            <label class="form-label" for="event-end">End Time</label>
            <input class="form-input" type="time" id="event-end" value="10:00" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="event-location">Location <span style="font-weight:400;text-transform:none;">(optional)</span></label>
          <input class="form-input" type="text" id="event-location" placeholder="e.g. Village Hall" />
        </div>
        <div class="form-group">

<!-- ═══════════════════════════════════════════════
     SCRIPT
═══════════════════════════════════════════════ -->
<script>
/* ──────────────────────────────────────────────
   CONFIG  ← update these if needed
────────────────────────────────────────────── */
const CONFIG = {
  N8N_BASE:           'https://n8n.newhorizon-it.co.uk',
  MATT_PATH:          '/webhook/peeters-matt-events',
  FAMILY_PATH:        '/webhook/peeters-family-events',
  CREATE_EVENT_PATH:  '/webhook/peeters-create-event',
  DELETE_EVENT_PATH:  '/webhook/peeters-delete-event',
  WEATHER_LOC:        'Newent,Gloucestershire',
  CACHE_MINS:         10,
};

/* ──────────────────────────────────────────────
   STATE
────────────────────────────────────────────── */
const today   = new Date();
let viewYear  = today.getFullYear();
let viewMonth = today.getMonth();     // 0-indexed

let mattEvents   = [];   // events for current view month
let familyEvents = [];
const cache      = {};   // key: "YYYY-MM" → { ts, matt:[], family:[] }

let birthdays = loadBirthdays();

/* ──────────────────────────────────────────────
   DOM REFS
────────────────────────────────────────────── */
const calBody        = document.getElementById('cal-body');
const monthLabel     = document.getElementById('month-label');
const loadingBar     = document.getElementById('loading-bar');
const upcomingList   = document.getElementById('upcoming-list');
const birthdayList   = document.getElementById('birthday-list');
const weatherWidget  = document.getElementById('weather-widget');

const dayModal       = document.getElementById('day-modal');
const dayModalTitle  = document.getElementById('day-modal-title');
const dayModalBody   = document.getElementById('day-modal-body');
const dayModalClose  = document.getElementById('day-modal-close');

const bdayModal      = document.getElementById('bday-modal');
const bdayModalClose = document.getElementById('bday-modal-close');
const bdayForm       = document.getElementById('bday-form');

const eventModal      = document.getElementById('event-modal');
const eventModalClose = document.getElementById('event-modal-close');
const eventForm       = document.getElementById('event-form');
const eventAllDay     = document.getElementById('event-allday');
const eventTimeFields = document.getElementById('event-time-fields');
const eventFeedback   = document.getElementById('event-feedback');
const eventSubmit     = document.getElementById('event-submit');

/* ──────────────────────────────────────────────
   INIT
────────────────────────────────────────────── */
document.getElementById('btn-prev').addEventListener('click', () => navigate(-1));
document.getElementById('btn-next').addEventListener('click', () => navigate(+1));
document.getElementById('btn-today').addEventListener('click', goToday);
document.getElementById('btn-add-bday').addEventListener('click', () => openModal(bdayModal));
document.getElementById('btn-add-event').addEventListener('click', openEventModal);
dayModalClose.addEventListener('click',   () => closeModal(dayModal));
bdayModalClose.addEventListener('click',  () => closeModal(bdayModal));
eventModalClose.addEventListener('click', () => closeModal(eventModal));
bdayForm.addEventListener('submit', handleAddBirthday);
eventForm.addEventListener('submit', handleAddEvent);

// Toggle time fields when all-day is checked
eventAllDay.addEventListener('change', () => {
  eventTimeFields.style.display = eventAllDay.checked ? 'none' : 'grid';
});

// Close on overlay click
[dayModal, bdayModal, eventModal].forEach(m => m.addEventListener('click', e => {
  if (e.target === m) closeModal(m);
}));

fetchWeather();
renderView();

/* ──────────────────────────────────────────────
   NAVIGATION
────────────────────────────────────────────── */
function navigate(delta) {
  viewMonth += delta;
  if (viewMonth > 11) { viewMonth = 0;  viewYear++; }
  if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
  renderView();
}
function goToday() {
  viewYear  = today.getFullYear();
  viewMonth = today.getMonth();
  renderView();
}

/* ──────────────────────────────────────────────
   RENDER VIEW (fetch data then draw)
────────────────────────────────────────────── */
async function renderView() {
  const key = `${viewYear}-${String(viewMonth).padStart(2,'0')}`;
  monthLabel.textContent = new Date(viewYear, viewMonth, 1)
    .toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });

  // Use cache if fresh
  if (cache[key] && (Date.now() - cache[key].ts) < CONFIG.CACHE_MINS * 60_000) {
    mattEvents   = cache[key].matt;
    familyEvents = cache[key].family;
    drawCalendar();
    renderUpcoming();
    return;
  }

  // Fetch from n8n
  setLoading(true);
  const start = new Date(viewYear, viewMonth, 1).toISOString();
  const end   = new Date(viewYear, viewMonth + 1, 0, 23, 59, 59).toISOString();
  const params = `?start=${encodeURIComponent(start)}&end=${encodeURIComponent(end)}`;

  const [matt, family] = await Promise.all([
    fetchEvents(CONFIG.N8N_BASE + CONFIG.MATT_PATH   + params, 'matt'),
    fetchEvents(CONFIG.N8N_BASE + CONFIG.FAMILY_PATH + params, 'family'),
  ]);

  mattEvents   = matt;
  familyEvents = family;
  cache[key]   = { ts: Date.now(), matt, family };
  setLoading(false);
  drawCalendar();
  renderUpcoming();
}

async function fetchEvents(url, calType) {
  try {
    const res  = await fetch(url);
    const data = await res.json();
    // n8n returns { events: [...] } from our Code node
    const list = Array.isArray(data) ? data : (data.events || []);
    return list.map(e => ({ ...e, calendar: calType }));
  } catch (err) {
    console.warn(`Could not fetch ${calType} events:`, err);
    return [];
  }
}

function setLoading(on) {
  loadingBar.classList.toggle('active', on);
}

/* ──────────────────────────────────────────────
   DRAW CALENDAR GRID
────────────────────────────────────────────── */
function drawCalendar() {
  calBody.innerHTML = '';

  // First day of month (adjust so Monday = 0)
  const firstDay = new Date(viewYear, viewMonth, 1);
  let startDow = firstDay.getDay(); // 0=Sun … 6=Sat
  startDow = (startDow === 0) ? 6 : startDow - 1; // shift to Mon-start

  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();
  const totalCells  = Math.ceil((startDow + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i++) {
    let cellDay, cellMonth, cellYear, isOtherMonth = false;

    if (i < startDow) {
      // Previous month overflow
      cellDay   = daysInPrev - startDow + 1 + i;
      cellMonth = viewMonth - 1;
      cellYear  = viewYear;
      if (cellMonth < 0) { cellMonth = 11; cellYear--; }
      isOtherMonth = true;
    } else if (i >= startDow + daysInMonth) {
      // Next month overflow
      cellDay   = i - startDow - daysInMonth + 1;
      cellMonth = viewMonth + 1;
      cellYear  = viewYear;
      if (cellMonth > 11) { cellMonth = 0; cellYear++; }
      isOtherMonth = true;
    } else {
      cellDay   = i - startDow + 1;
      cellMonth = viewMonth;
      cellYear  = viewYear;
    }

    const cellDate  = new Date(cellYear, cellMonth, cellDay);
    const isToday   = sameDay(cellDate, today);
    const isWed     = cellDate.getDay() === 3; // Wednesday
    const isWeekend = cellDate.getDay() === 0 || cellDate.getDay() === 6;

    const cell = document.createElement('div');
    cell.className = 'cal-cell' +
      (isOtherMonth ? ' other-month' : '') +
      (isToday ? ' today' : '');
    cell.dataset.date = cellDate.toISOString().slice(0, 10);

    // Date number
    const dateEl = document.createElement('div');
    dateEl.className = 'cell-date' + (isWeekend ? ' weekend' : '');
    dateEl.textContent = cellDay;
    cell.appendChild(dateEl);

    // Forest School badge (Wednesdays)
    if (isWed) {
      const badge = document.createElement('div');
      badge.className = 'forest-badge';
      badge.innerHTML = '🌲 Forest School';
      cell.appendChild(badge);
    }

    // Events for this cell
    const cellEvents = getEventsForDate(cellDate);
    const maxShow = isWed ? 2 : 3;
    const shown   = cellEvents.slice(0, maxShow);
    const hidden  = cellEvents.length - shown.length;

    shown.forEach(ev => {
      const chip = document.createElement('div');
      chip.className = `event-chip ${ev.calendar}`;
      chip.textContent = ev.calendar === 'birthday'
        ? `🎂 ${ev.subject}`
        : ev.subject || '(No title)';
      chip.title = ev.subject;
      chip.addEventListener('click', e => { e.stopPropagation(); openDayModal(cellDate); });
      cell.appendChild(chip);
    });

    if (hidden > 0) {
      const more = document.createElement('div');
      more.className = 'more-events';
      more.textContent = `+${hidden} more`;
      cell.appendChild(more);
    }

    cell.addEventListener('click', () => openDayModal(cellDate));
    calBody.appendChild(cell);
  }

  renderBirthdayList();
}

/* ──────────────────────────────────────────────
   EVENT LOOKUP
────────────────────────────────────────────── */
function getEventsForDate(date) {
  const ymd = toYMD(date);
  const results = [];

  // Outlook events (Matt)
  mattEvents.forEach(ev => {
    if (eventOnDate(ev, date)) results.push({ ...ev, calendar: 'matt' });
  });

  // Outlook events (Family)
  familyEvents.forEach(ev => {
    if (eventOnDate(ev, date)) results.push({ ...ev, calendar: 'family' });
  });

  // Birthdays
  birthdays.forEach(b => {
    if (b.month === date.getMonth() && b.day === date.getDate()) {
      const age = b.year ? ` (${date.getFullYear() - b.year})` : '';
      results.push({ subject: `${b.name}${age}`, calendar: 'birthday', id: b.id });
    }
  });

  return results;
}

function eventOnDate(ev, date) {
  if (!ev.start) return false;
  const startStr = ev.start.dateTime || ev.start.date;
  const endStr   = ev.end?.dateTime  || ev.end?.date;
  if (!startStr) return false;

  const start = new Date(startStr);
  const end   = endStr ? new Date(endStr) : start;
  const dayStart = new Date(date); dayStart.setHours(0,0,0,0);
  const dayEnd   = new Date(date); dayEnd.setHours(23,59,59,999);

  return start <= dayEnd && end >= dayStart;
}

/* ──────────────────────────────────────────────
   DAY MODAL
────────────────────────────────────────────── */
function openDayModal(date) {
  dayModalTitle.textContent = date.toLocaleDateString('en-GB', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
  });
  dayModalBody.innerHTML = '';

  const isWed    = date.getDay() === 3;
  const dayEvts  = getEventsForDate(date);

  // Forest school entry for Wednesdays
  if (isWed) {
    dayModalBody.appendChild(makeEventRow({
      icon: '🌲',
      subject: 'Forest School',
      time: 'All day',
      location: '',
      type: 'forest',
    }));
  }

  if (dayEvts.length === 0 && !isWed) {
    const msg = document.createElement('div');
    msg.className = 'no-events-msg';
    msg.textContent = 'Nothing scheduled for this day.';
    dayModalBody.appendChild(msg);
  }

  dayEvts.forEach(ev => {
    const time = formatEventTime(ev);
    dayModalBody.appendChild(makeEventRow({
      icon:     ev.calendar === 'matt'     ? '🔵'
              : ev.calendar === 'family'   ? '🟢'
              : '🎂',
      subject:  ev.subject || '(No title)',
      time,
      location: ev.location || '',
      type:     ev.calendar,
      eventId:  ev.id || null,
    }));
  });

  openModal(dayModal);
}

function makeEventRow({ icon, subject, time, location, type, eventId }) {
  const wrap = document.createElement('div');
  wrap.className = `day-event-item ${type}`;
  wrap.style.justifyContent = 'space-between';
  wrap.innerHTML = `
    <div style="display:flex;gap:10px;align-items:flex-start;flex:1;min-width:0;">
      <div class="day-event-icon">${icon}</div>
      <div style="min-width:0;">
        <div class="day-event-subject ${type}">${escHtml(subject)}</div>
        ${time     ? `<div class="day-event-time">⏰ ${escHtml(time)}</div>` : ''}
        ${location ? `<div class="day-event-loc">📍 ${escHtml(location)}</div>` : ''}
      </div>
    </div>
    ${type === 'family' && eventId ? `<button class="delete-event-btn" data-id="${escHtml(eventId)}" title="Delete event">🗑️</button>` : ''}`;

  if (type === 'family' && eventId) {
    wrap.querySelector('.delete-event-btn').addEventListener('click', e => {
      e.stopPropagation();
      deleteEvent(eventId, subject, wrap);
    });
  }
  return wrap;
}

async function deleteEvent(eventId, subject, rowEl) {
  if (!confirm(`Are you sure you want to delete:\n\n"${subject}"?`)) return;

  rowEl.style.opacity = '0.5';
  rowEl.style.pointerEvents = 'none';

  try {
    const res = await fetch(CONFIG.N8N_BASE + CONFIG.DELETE_EVENT_PATH, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ eventId }),
    });

    if (res.ok) {
      rowEl.remove();
      // Bust cache so calendar reloads
      const key = `${viewYear}-${String(viewMonth).padStart(2,'0')}`;
      delete cache[key];
      renderView();
    } else {
      throw new Error(`Status ${res.status}`);
    }
  } catch (err) {
    alert('Could not delete event — check n8n is active.');
    rowEl.style.opacity = '1';
    rowEl.style.pointerEvents = 'auto';
  }
}

function formatEventTime(ev) {
  if (!ev.start) return '';
  if (ev.isAllDay) return 'All day';
  const startStr = ev.start.dateTime;
  const endStr   = ev.end?.dateTime;
  if (!startStr) return 'All day';
  const s = new Date(startStr).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  if (!endStr) return s;
  const e = new Date(endStr).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  return `${s} – ${e}`;
}

/* ──────────────────────────────────────────────
   UPCOMING SIDEBAR
────────────────────────────────────────────── */
function renderUpcoming() {
  const items = [];
  const now   = new Date(); now.setHours(0,0,0,0);
  const limit = new Date(); limit.setDate(limit.getDate() + 14);

  // Matt + family events
  [...mattEvents, ...familyEvents].forEach(ev => {
    if (!ev.start) return;
    const dateStr = ev.start.dateTime || ev.start.date;
    const d = new Date(dateStr); d.setHours(0,0,0,0);
    if (d >= now && d <= limit) {
      items.push({ date: d, subject: ev.subject || '(No title)', type: ev.calendar, time: formatEventTime(ev) });
    }
  });

  // Birthdays in next 30 days
  const thisYear = today.getFullYear();
  birthdays.forEach(b => {
    let bDay = new Date(thisYear, b.month, b.day); bDay.setHours(0,0,0,0);
    if (bDay < now) bDay = new Date(thisYear + 1, b.month, b.day);
    if (bDay <= limit) {
      items.push({ date: bDay, subject: `${b.name}'s Birthday`, type: 'birthday', time: 'All day' });
    }
  });

  items.sort((a, b) => a.date - b.date);

  upcomingList.innerHTML = '';
  if (items.length === 0) {
    upcomingList.innerHTML = '<div class="upcoming-empty">Nothing in the next 2 weeks</div>';
    return;
  }

  items.slice(0, 8).forEach(it => {
    const isToday = sameDay(it.date, today);
    const label   = isToday ? 'Today' : it.date.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    const div = document.createElement('div');
    div.className = 'upcoming-item';
    div.innerHTML = `
      <div class="upcoming-dot ${it.type}"></div>
      <div>
        <div class="upcoming-subject">${escHtml(it.subject)}</div>
        <div class="upcoming-when">${label} · ${it.time || 'All day'}</div>
      </div>`;
    upcomingList.appendChild(div);
  });
}

/* ──────────────────────────────────────────────
   BIRTHDAY MANAGEMENT
────────────────────────────────────────────── */
function loadBirthdays() {
  try { return JSON.parse(localStorage.getItem('peeters-birthdays') || '[]'); }
  catch { return []; }
}
function saveBirthdays() {
  localStorage.setItem('peeters-birthdays', JSON.stringify(birthdays));
}

async function handleAddBirthday(e) {
  e.preventDefault();
  const name  = document.getElementById('bday-name').value.trim();
  const month = parseInt(document.getElementById('bday-month').value, 10);
  const day   = parseInt(document.getElementById('bday-day').value, 10);
  const year  = document.getElementById('bday-year').value
              ? parseInt(document.getElementById('bday-year').value, 10)
              : null;

  if (!name || isNaN(month) || isNaN(day)) return;

  birthdays.push({ id: crypto.randomUUID(), name, month, day, year });
  saveBirthdays();
  bdayForm.reset();
  closeModal(bdayModal);
  drawCalendar();
  renderUpcoming();

  // Also create an all-day event in the Family Outlook calendar
  const yr = today.getFullYear();
  let bdayDate = new Date(yr, month, day);
  if (bdayDate < today) bdayDate = new Date(yr + 1, month, day);
  const dateStr = bdayDate.toISOString().slice(0, 10);
  const ageStr  = year ? ` (turns ${bdayDate.getFullYear() - year})` : '';

  const tzOff = (() => {
    const off = -new Date().getTimezoneOffset();
    const sign = off >= 0 ? '+' : '-';
    const h = String(Math.floor(Math.abs(off) / 60)).padStart(2, '0');
    const m = String(Math.abs(off) % 60).padStart(2, '0');
    return `${sign}${h}:${m}`;
  })();

  try {
    await fetch(CONFIG.N8N_BASE + CONFIG.CREATE_EVENT_PATH, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        subject:   `🎂 ${name}'s Birthday${ageStr}`,
        isAllDay:  true,
        start:     `${dateStr}T00:00:00${tzOff}`,
        end:       `${dateStr}T23:59:59${tzOff}`,
        location:  '',
        notes:     year ? `${name} was born in ${year}.` : '',
      }),
    });
  } catch (err) {
    console.warn('Could not add birthday to Family calendar:', err);
  }
}

function deleteBirthday(id) {
  birthdays = birthdays.filter(b => b.id !== id);
  saveBirthdays();
  renderBirthdayList();
  drawCalendar();
  renderUpcoming();
}

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function renderBirthdayList() {
  birthdayList.innerHTML = '';
  if (birthdays.length === 0) {
    birthdayList.innerHTML = '<div class="bday-empty">No birthdays saved yet</div>';
    return;
  }

  // Sort by month+day
  const sorted = [...birthdays].sort((a, b) => a.month !== b.month ? a.month - b.month : a.day - b.day);
  sorted.forEach(b => {
    const div = document.createElement('div');
    div.className = 'bday-item';
    const yearStr = b.year ? ` ${b.year}` : '';
    div.innerHTML = `
      <div class="bday-item-left">
        <span style="font-size:16px">🎂</span>
        <div>
          <div class="bday-name">${escHtml(b.name)}</div>
          <div class="bday-date">${MONTHS[b.month]} ${b.day}${yearStr}</div>
        </div>
      </div>
      <button class="bday-delete" title="Remove">✕</button>`;
    div.querySelector('.bday-delete').addEventListener('click', () => deleteBirthday(b.id));
    birthdayList.appendChild(div);
  });
}

/* ──────────────────────────────────────────────
   WEATHER (wttr.in — no API key needed)
────────────────────────────────────────────── */
async function fetchWeather() {
  try {
    const url = `https://wttr.in/${encodeURIComponent(CONFIG.WEATHER_LOC)}?format=j1`;
    const res  = await fetch(url);
    const data = await res.json();

    const cur    = data.current_condition[0];
    const todayW = data.weather[0];
    const tomW   = data.weather[1];

    const curTemp  = cur.temp_C;
    const curCode  = parseInt(cur.weatherCode, 10);
    const curDesc  = cur.weatherDesc[0].value;

    const tomMax   = tomW.maxtempC;
    const tomMin   = tomW.mintempC;
    const tomCode  = parseInt(tomW.hourly[4].weatherCode, 10);
    const tomDesc  = tomW.hourly[4].weatherDesc[0].value;

    weatherWidget.innerHTML = `
      <div class="weather-day">
        <div class="weather-label">Today</div>
        <div class="weather-emoji">${weatherEmoji(curCode)}</div>
        <div class="weather-temp">${curTemp}°C</div>
        <div class="weather-desc">${curDesc}</div>
      </div>
      <div class="weather-divider"></div>
      <div class="weather-day">
        <div class="weather-label">Tomorrow</div>
        <div class="weather-emoji">${weatherEmoji(tomCode)}</div>
        <div class="weather-temp">${tomMax}° / ${tomMin}°</div>
        <div class="weather-desc">${tomDesc}</div>
      </div>`;
  } catch (err) {
    weatherWidget.innerHTML = '<span style="font-size:11px;color:#94a3b8">Weather unavailable</span>';
  }
}

function weatherEmoji(code) {
  if (code === 113)                                  return '☀️';
  if (code === 116)                                  return '⛅';
  if ([119, 122].includes(code))                     return '☁️';
  if ([143, 248, 260].includes(code))                return '🌫️';
  if ([386, 389, 392, 395, 200].includes(code))      return '⛈️';
  if (code >= 326 && code <= 338)                    return '❄️';
  if ([227, 230].includes(code))                     return '🌨️';
  if (code >= 311 && code <= 320)                    return '🌨️';
  if (code >= 263 && code <= 308)                    return '🌧️';
  if (code >= 353 && code <= 374)                    return '🌦️';
  return '🌤️';
}

/* ──────────────────────────────────────────────
   ADD EVENT
────────────────────────────────────────────── */
function openEventModal() {
  // Default date to today
  const d = today.toISOString().slice(0, 10);
  document.getElementById('event-date').value = d;
  eventAllDay.checked = false;
  eventTimeFields.style.display = 'grid';
  eventFeedback.style.display = 'none';
  eventSubmit.disabled = false;
  eventSubmit.textContent = 'Add to Family Calendar 📅';
  eventForm.reset();
  document.getElementById('event-date').value = d;
  document.getElementById('event-start').value = '09:00';
  document.getElementById('event-end').value = '10:00';
  openModal(eventModal);
}

async function handleAddEvent(e) {
  e.preventDefault();

  const title    = document.getElementById('event-title').value.trim();
  const date     = document.getElementById('event-date').value;
  const isAllDay = eventAllDay.checked;
  const start    = document.getElementById('event-start').value;
  const end      = document.getElementById('event-end').value;
  const location = document.getElementById('event-location').value.trim();
  const notes    = document.getElementById('event-notes').value.trim();

  // Build timezone offset string e.g. "+01:00" for BST
  const tzOffset = (() => {
    const off = -new Date().getTimezoneOffset();
    const sign = off >= 0 ? '+' : '-';
    const h = String(Math.floor(Math.abs(off) / 60)).padStart(2, '0');
    const m = String(Math.abs(off) % 60).padStart(2, '0');
    return `${sign}${h}:${m}`;
  })();

  const payload = {
    subject:   title,
    isAllDay,
    location,
    notes,
    start: isAllDay ? `${date}T00:00:00${tzOffset}` : `${date}T${start}:00${tzOffset}`,
    end:   isAllDay ? `${date}T23:59:59${tzOffset}` : `${date}T${end}:00${tzOffset}`,
  };

  eventSubmit.disabled = true;
  eventSubmit.textContent = 'Saving…';
  showEventFeedback('', '');

  try {
    const res = await fetch(CONFIG.N8N_BASE + CONFIG.CREATE_EVENT_PATH, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });

    if (res.ok) {
      showEventFeedback('✅ Event added to Family calendar!', 'success');
      // Bust cache for this month so it reloads
      const key = `${viewYear}-${String(viewMonth).padStart(2,'0')}`;
      delete cache[key];
      setTimeout(() => {
        closeModal(eventModal);
        renderView();
      }, 1200);
    } else {
      throw new Error(`Server returned ${res.status}`);
    }
  } catch (err) {
    showEventFeedback('❌ Could not save event. Check n8n is active.', 'error');
    eventSubmit.disabled = false;
    eventSubmit.textContent = 'Add to Family Calendar 📅';
  }
}

function showEventFeedback(msg, type) {
  if (!msg) { eventFeedback.style.display = 'none'; return; }
  eventFeedback.style.display = 'block';
  eventFeedback.textContent = msg;
  eventFeedback.style.background = type === 'success' ? '#d1fae5' : '#fee2e2';
  eventFeedback.style.color      = type === 'success' ? '#065f46' : '#991b1b';
}

/* ──────────────────────────────────────────────
   MODAL HELPERS
────────────────────────────────────────────── */
function openModal(m)  { m.classList.add('open'); }
function closeModal(m) { m.classList.remove('open'); }

/* ──────────────────────────────────────────────
   UTILITIES
────────────────────────────────────────────── */
function sameDay(a, b) {
  return a.getFullYear() === b.getFullYear() &&
         a.getMonth()    === b.getMonth()    &&
         a.getDate()     === b.getDate();
}
function toYMD(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
